# Firebase App Hosting configuration.
# https://firebase.google.com/docs/app-hosting/configure
#
# Runtime resources for the Cloud Run backend that serves this Next.js app.
runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables available to the server (API routes / Firestore).
# Secrets (the private key) are stored in Cloud Secret Manager — set them with:
#   firebase apphosting:secrets:set FIREBASE_PRIVATE_KEY
# or via the App Hosting UI → "Secret" type. The two non-secret values can be
# plain VALUEs here.
env:
  - variable: FIREBASE_PROJECT_ID
    value: yuyyu-cff81
    availability:
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@yuyyu-cff81.iam.gserviceaccount.com
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
